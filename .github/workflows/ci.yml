name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '17 18 * * *'
  workflow_dispatch:

jobs:
  packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check
      - run: pnpm run check:packages
      - run: pnpm --dir packages/clang-common test
      - run: pnpm --dir packages/lsp test
      - run: pnpm exec vitest run src/lib/sync-wasm-clang.test.ts src/lib/sync-wasm-d.test.ts src/lib/sync-wasm-rust.test.ts
      - run: pnpm run verify:package

  lsp-browser-smoke:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright-core install --with-deps chromium
      - run: pnpm run test:lsp:browser:smoke

  lsp-browser-full:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright-core install --with-deps chromium
      - run: pnpm run test:lsp:browser:full
