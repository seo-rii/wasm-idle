name: CI

on:
  push:
    branches:
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Free Runner Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          docker system prune -af || true
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Sign in to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: 'projects/175809265292/locations/global/workloadIdentityPools/github/providers/github-api'
          service_account: 'deploy-dool@hancomac.iam.gserviceaccount.com'

      - name: Use docker login action
        uses: docker/login-action@v3
        with:
          registry: 'asia.gcr.io'
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.access_token }}'

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install Global Dependencies
        run: npm install -g pnpm@9.15.9

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and Push Docker Image
        run: pnpm run deploy --beta

      - name: Summarize judge toolchain versions
        shell: bash
        run: |
          image_ref='asia.gcr.io/hancomac/dool-base:dev'
          docker pull "$image_ref"
          bash ./scripts/report-toolchain-versions.sh "$image_ref" | tee -a "$GITHUB_STEP_SUMMARY"
